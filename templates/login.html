<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Garbage Collector Service - Login</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f4f6f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        h2 { color: #2c3e50; margin-bottom: 24px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #27ae60; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 10px; }
        button:hover { background: #219653; }
        .alert { padding: 10px; background: #e74c3c; color: white; margin-bottom: 15px; border-radius: 4px; font-size: 14px;}
        .success { padding: 10px; background: #2ecc71; color: white; margin-bottom: 15px; border-radius: 4px; font-size: 14px;}
        .footer-link { margin-top: 20px; font-size: 14px; color: #3498db; }
        .footer-link a { color: #2980b9; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>🗑️ Garbage Collector Service</h2>
        
       

        <form method="POST">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Sign In</button>
        </form>

        <div class="footer-link">
            Don't have an account? <a href="{{ url_for('signup') }}">Sign Up Here</a>
        </div>
    </div>
</body>
</html>
